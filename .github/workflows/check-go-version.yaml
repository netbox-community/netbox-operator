---
name: Check Go version consistency
on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
permissions: read-all
jobs:
  check-go-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0
      - name: Check Go version mismatch between go.mod toolchain and Dockerfile
        run: |
          set -euo pipefail

          TOOLCHAIN_VERSION=$(grep '^toolchain' go.mod | sed 's/toolchain go//')
          DOCKERFILE_VERSION=$(grep '^FROM golang:' Dockerfile | head -1 | sed 's/FROM golang:\([^ ]*\).*/\1/')

          if [ -z "$TOOLCHAIN_VERSION" ]; then
            echo "ERROR: Could not extract toolchain version from go.mod"
            exit 1
          fi

          if [ -z "$DOCKERFILE_VERSION" ]; then
            echo "ERROR: Could not extract Go version from Dockerfile"
            exit 1
          fi

          echo "go.mod toolchain version: $TOOLCHAIN_VERSION"
          echo "Dockerfile Go version:    $DOCKERFILE_VERSION"

          if [ "$TOOLCHAIN_VERSION" != "$DOCKERFILE_VERSION" ]; then
            echo "ERROR: Go version mismatch! go.mod toolchain ($TOOLCHAIN_VERSION) != Dockerfile ($DOCKERFILE_VERSION)"
            exit 1
          fi

          echo "OK: Go versions match."
